<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VentaFlow v18 — Enterprise POS</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050912">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #050912; --bg2: #080d1a; --surface: #0c1221; --surface2: #111827;
    --surface3: #1a2438; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --accent: #5b8ef4; --accent-glow: rgba(91,142,244,0.25);
    --green: #34d399; --red: #f87171; --amber: #fbbf24; --indigo: #818cf8;
    --text: #f0f4ff; --text-soft: #a8b8d0; --text-muted: #64748b;
    --radius: 16px; --radius-sm: 10px; --shadow: 0 20px 40px -8px rgba(0,0,0,0.6);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { 
    font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); 
    min-height: 100vh; overflow: hidden;
    background-image: radial-gradient(circle at 50% 0%, #111827 0%, #050912 100%);
}
.mono { font-family: 'JetBrains Mono', monospace; }

/* --- ANIMACIONES --- */
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

/* --- LAYOUT PRINCIPAL --- */
.app { display: flex; height: 100vh; width: 100vw; }

.sidebar {
    width: 260px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
}

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.topbar {
    height: 64px; border-bottom: 1px solid var(--border); display: flex; 
    align-items: center; justify-content: space-between; padding: 0 24px;
    background: rgba(12, 18, 33, 0.8); backdrop-filter: blur(12px); flex-shrink: 0;
}

.content { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
.page { display: none; animation: slideUp 0.3s ease-out; }
.page.active { display: block; }

/* --- COMPONENTES UI --- */
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 20px; border-radius: var(--radius-sm); border: none;
    font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 13px;
}
.btn-accent { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
.btn-accent:active { transform: scale(0.95); }
.btn-ghost { background: var(--surface3); color: var(--text-soft); border: 1px solid var(--border); }

.input {
    background: var(--bg2); border: 1px solid var(--border2); color: var(--text);
    padding: 12px 16px; border-radius: var(--radius-sm); outline: none; transition: 0.2s;
    width: 100%; font-family: inherit;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }

/* --- POS GRID --- */
.pos-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; height: calc(100vh - 120px); }
.products-grid { 
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
    gap: 12px; overflow-y: auto; align-content: start;
}
.product-tile {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; position: relative; transition: 0.2s;
    display: flex; flex-direction: column; gap: 8px;
}
.product-tile:hover { border-color: var(--accent); transform: translateY(-3px); background: var(--surface2); }

/* --- CARRITO --- */
.cart-panel { 
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    display: flex; flex-direction: column; overflow: hidden;
}
.cart-items { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.cart-item {
    background: var(--bg2); padding: 12px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: space-between;
}

/* --- AUTH & PIN --- */
.auth-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.pin-grid { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; margin-top: 30px; }
.pin-btn {
    width: 70px; height: 70px; border-radius: 50%; background: var(--surface2);
    border: 1px solid var(--border2); color: white; font-size: 24px; font-weight: bold;
    cursor: pointer;
}
.pin-dots { display: flex; gap: 15px; margin: 20px 0; }
.dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border2); }
.dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

/* --- MOBILE SPECIFIC --- */
#mobile-nav { display: none; }
#mobile-cart-fab { display: none; }

@media (max-width: 900px) {
    .sidebar { position: fixed; transform: translateX(-100%); bottom: 0; top: 0; }
    .sidebar.open { transform: translateX(0); }
    .pos-layout { grid-template-columns: 1fr; }
    .cart-panel { display: none; }
    #mobile-nav { 
        display: flex; position: fixed; bottom: 0; width: 100%; height: 65px;
        background: var(--surface); border-top: 1px solid var(--border); justify-content: space-around;
        align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 10;
    }
    #mobile-cart-fab {
        display: flex; position: fixed; bottom: 80px; right: 20px;
        width: 60px; height: 60px; border-radius: 50%; background: var(--accent);
        box-shadow: 0 5px 20px rgba(0,0,0,0.4); align-items: center; justify-content: center;
        z-index: 9; color: white;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-muted); gap: 4px; }
    .nav-item.active { color: var(--accent); }
    .content { padding-bottom: 80px; }
}

/* --- TOAST --- */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
.toast { 
    background: var(--surface2); border-left: 4px solid var(--accent); padding: 12px 20px;
    border-radius: 8px; margin-bottom: 10px; animation: fadeIn 0.3s; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 10px;
}
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="pin-screen" class="auth-screen">
    <div class="brand" style="font-family:'Syne'; font-size: 32px; font-weight: 800; margin-bottom: 10px;">Venta<span>Flow</span></div>
    <div id="pin-user-name" style="color: var(--text-soft); font-weight: 600;">Bienvenido</div>
    <div class="pin-dots" id="pin-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="pin-grid">
        <button class="pin-btn" onclick="pressPin(1)">1</button>
        <button class="pin-btn" onclick="pressPin(2)">2</button>
        <button class="pin-btn" onclick="pressPin(3)">3</button>
        <button class="pin-btn" onclick="pressPin(4)">4</button>
        <button class="pin-btn" onclick="pressPin(5)">5</button>
        <button class="pin-btn" onclick="pressPin(6)">6</button>
        <button class="pin-btn" onclick="pressPin(7)">7</button>
        <button class="pin-btn" onclick="pressPin(8)">8</button>
        <button class="pin-btn" onclick="pressPin(9)">9</button>
        <button class="pin-btn" style="background:transparent; border:none;" onclick="clearPin()">C</button>
        <button class="pin-btn" onclick="pressPin(0)">0</button>
        <button class="pin-btn" style="background:transparent; border:none;" onclick="backspacePin()">⌫</button>
    </div>
    <button class="btn btn-ghost" style="margin-top: 40px;" onclick="location.reload()">Cambiar Base de Datos</button>
</div>

<div id="main-app" class="app" style="display:none">
    
    <aside class="sidebar" id="sidebar">
        <div style="padding: 24px; border-bottom: 1px solid var(--border);">
            <div class="brand" style="font-family:'Syne'; font-size: 22px; font-weight: 800;">Venta<span>Flow</span></div>
            <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-top: 4px;" id="biz-name">MI TIENDA</div>
        </div>
        <nav style="flex: 1; padding: 15px;">
            <div style="font-size: 10px; font-weight: 800; color: var(--text-muted); margin: 15px 10px 10px;">OPERACIÓN</div>
            <button class="btn btn-ghost" style="width: 100%; justify-content: flex-start;" onclick="showPage('pos')">🛒 Punto de Venta</button>
            <button class="btn btn-ghost" style="width: 100%; justify-content: flex-start; margin-top: 5px;" onclick="showPage('history')">📋 Mis Ventas</button>
            
            <div class="admin-only">
                <div style="font-size: 10px; font-weight: 800; color: var(--text-muted); margin: 25px 10px 10px;">GERENCIA</div>
                <button class="btn btn-ghost" style="width: 100%; justify-content: flex-start;" onclick="showPage('reports')">📊 Dashboard</button>
                <button class="btn btn-ghost" style="width: 100%; justify-content: flex-start; margin-top: 5px;" onclick="showPage('inventory')">📦 Inventario</button>
                <button class="btn btn-ghost" style="width: 100%; justify-content: flex-start; margin-top: 5px;" onclick="showPage('crm')">👥 Clientes</button>
            </div>
        </nav>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 10px; padding: 10px;">
                <div id="user-avatar" style="width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold;">U</div>
                <div>
                    <div id="user-name-display" style="font-size: 13px; font-weight: 700;">Usuario</div>
                    <div id="user-role-display" style="font-size: 10px; color: var(--text-muted);">Cajero</div>
                </div>
            </div>
            <button class="btn btn-ghost" style="width: 100%; color: var(--red);" onclick="logout()">Cerrar Sesión</button>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="btn btn-ghost" id="menu-toggle" style="display: none;" onclick="toggleSidebar()">☰</button>
                <h2 id="page-title" style="font-family:'Syne'; font-size: 18px;">Punto de Venta</h2>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="mono" id="live-clock" style="font-size: 13px; color: var(--text-soft);">00:00:00</div>
                <div id="sync-indicator" style="width: 8px; height: 8px; border-radius: 50%; background: var(--green);"></div>
            </div>
        </header>

        <div id="page-pos" class="content page active">
            <div class="pos-layout">
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="pos-search" class="input" placeholder="Buscar producto (Atajo: /)..." oninput="renderPos()">
                        <button class="btn btn-ghost" onclick="openScanner()">📷</button>
                    </div>
                    <div id="pos-categories" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px;">
                        </div>
                    <div id="pos-products" class="products-grid">
                        </div>
                </div>
                
                <div class="cart-panel">
                    <div style="padding: 15px; background: var(--surface2); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 800;">Carrito</span>
                        <button class="btn btn-ghost" style="padding: 5px 10px; font-size: 10px;" onclick="clearCart()">Vaciar</button>
                    </div>
                    <div id="cart-items" class="cart-items">
                        </div>
                    <div style="padding: 20px; background: var(--surface2); border-top: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px;">
                            <span style="color: var(--text-muted);">Subtotal</span>
                            <span id="cart-subtotal">$0.00</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <span style="font-weight: 800; font-family: 'Syne';">TOTAL</span>
                            <span id="cart-total" class="mono" style="font-size: 24px; color: var(--accent); font-weight: 700;">$0.00</span>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <button class="btn btn-accent" style="background: var(--green);" onclick="processSale('Efectivo')">💵 Efectivo</button>
                            <button class="btn btn-accent" onclick="processSale('Tarjeta')">💳 Tarjeta</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-reports" class="content page">
            <div class="dash-kpi-grid" id="kpi-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                </div>
            <div class="card" style="margin-top: 20px;">
                <canvas id="mainChart" height="150"></canvas>
            </div>
        </div>

        <div id="page-inventory" class="content page">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <input type="text" class="input" style="max-width: 300px;" placeholder="Filtrar inventario...">
                <button class="btn btn-accent">+ Nuevo Producto</button>
            </div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                    <thead style="background: var(--surface2); text-align: left;">
                        <tr>
                            <th style="padding: 15px;">Producto</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Margen</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <button id="mobile-cart-fab" onclick="showMobileCart()">
        <span id="cart-badge" style="position: absolute; top: -5px; right: -5px; background: var(--red); color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 800;">0</span>
        🛒
    </button>
    <nav id="mobile-nav">
        <button class="nav-item active" onclick="showPage('pos')"><span>🏠</span>Caja</button>
        <button class="nav-item" onclick="showPage('reports')"><span>📊</span>Dashboard</button>
        <button class="nav-item" onclick="showPage('inventory')"><span>📦</span>Stock</button>
        <button class="nav-item" onclick="toggleSidebar()"><span>☰</span>Más</button>
    </nav>
</div>

<div id="checkout-modal" class="auth-screen" style="display: none; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);">
    <div class="card" style="width: 90%; max-width: 400px; text-align: center;">
        <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Confirmar Pago</h2>
        <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase;">Total a recibir</div>
        <div id="checkout-total" class="mono" style="font-size: 42px; font-weight: 800; color: var(--accent); margin: 10px 0 30px;">$0.00</div>
        
        <div style="display: grid; gap: 10px;">
            <button class="btn btn-accent" style="padding: 15px;" onclick="confirmSale()">Finalizar Venta</button>
            <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURACIÓN & ESTADO ---
let state = {
    config: { scriptUrl: '', bizName: 'VentaFlow Enterprise' },
    user: null,
    products: [],
    cart: [],
    sales: [],
    pin: '',
    currentPage: 'pos'
};

// --- FORMATEO ---
const fmt = (n) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(n);

// --- LÓGICA DE PIN ---
function pressPin(n) {
    if (state.pin.length < 4) {
        state.pin += n;
        updatePinDots();
        if (state.pin.length === 4) validatePin();
    }
}

function updatePinDots() {
    const dots = document.querySelectorAll('#pin-dots .dot');
    dots.forEach((dot, i) => dot.classList.toggle('filled', i < state.pin.length));
}

function clearPin() { state.pin = ''; updatePinDots(); }
function backspacePin() { state.pin = state.pin.slice(0, -1); updatePinDots(); }

async function validatePin() {
    // Simulación de validación (Integrar con Google Sheets real aquí)
    if (state.pin === '0000') {
        state.user = { name: 'Admin Maestro', role: 'admin' };
        login();
    } else {
        showToast('PIN Incorrecto', 'error');
        clearPin();
    }
}

function login() {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    document.getElementById('user-name-display').innerText = state.user.name;
    document.getElementById('user-role-display').innerText = state.user.role.toUpperCase();
    
    // Mock de productos para demostración
    state.products = [
        { id: 1, name: 'Coca Cola 600ml', price: 18, stock: 45, category: 'Bebidas' },
        { id: 2, name: 'Sabritas Sal', price: 15, stock: 12, category: 'Snacks' },
        { id: 3, name: 'Gansito', price: 12, stock: 0, category: 'Snacks' },
        { id: 4, name: 'Agua Ciel 1L', price: 11, stock: 100, category: 'Bebidas' }
    ];
    
    renderPos();
    showToast('Sesión Iniciada', 'success');
}

// --- LÓGICA POS ---
function renderPos() {
    const grid = document.getElementById('pos-products');
    const search = document.getElementById('pos-search').value.toLowerCase();
    
    const filtered = state.products.filter(p => p.name.toLowerCase().includes(search));
    
    grid.innerHTML = filtered.map(p => `
        <div class="product-tile" onclick="addToCart(${p.id})">
            ${p.stock === 0 ? '<div style="position:absolute; top:8px; right:8px; background:var(--red); font-size:9px; padding:2px 6px; border-radius:4px; font-weight:800;">AGOTADO</div>' : ''}
            <div style="font-weight: 700; font-size: 13px; line-height: 1.2;">${p.name}</div>
            <div style="font-size: 11px; color: var(--text-muted);">${p.stock} pzas</div>
            <div class="mono" style="color: var(--accent); font-weight: 800; margin-top: auto;">${fmt(p.price)}</div>
        </div>
    `).join('');
}

function addToCart(id) {
    const p = state.products.find(x => x.id === id);
    if (p.stock <= 0) return showToast('Sin stock', 'error');
    
    const existing = state.cart.find(x => x.id === id);
    if (existing) {
        existing.qty++;
    } else {
        state.cart.push({ ...p, qty: 1 });
    }
    updateCart();
}

function updateCart() {
    const container = document.getElementById('cart-items');
    container.innerHTML = state.cart.map(item => `
        <div class="cart-item">
            <div style="flex: 1;">
                <div style="font-size: 12px; font-weight: 700;">${item.name}</div>
                <div style="font-size: 10px; color: var(--text-muted);">${fmt(item.price)} x ${item.qty}</div>
            </div>
            <div class="mono" style="font-weight: 800;">${fmt(item.price * item.qty)}</div>
        </div>
    `).join('');
    
    const total = state.cart.reduce((s, i) => s + (i.price * i.qty), 0);
    document.getElementById('cart-total').innerText = fmt(total);
    document.getElementById('cart-badge').innerText = state.cart.reduce((s, i) => s + i.qty, 0);
}

// --- UTILIDADES ---
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    document.getElementById('page-title').innerText = page.toUpperCase();
    
    // Update mobile nav
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    // Encontrar botón nav-item con el onclick correcto
}

function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

// --- RELOJ ---
setInterval(() => {
    document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('es-MX');
}, 1000);

// --- ATAJOS TECLADO ---
document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('pos-search').focus();
    }
});

// Inicialización de la base de datos (Ejemplo de como persistir la URL)
window.onload = () => {
    const savedUrl = localStorage.getItem('vflow_url');
    if (!savedUrl) {
        // Podrías forzar la configuración aquí
    }
};

</script>
</body>
</html>
